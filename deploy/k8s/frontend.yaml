apiVersion: apps/v1
kind: Deployment
metadata:
  name: h1b-frontend
  namespace: h1b-lottery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: h1b-frontend
  template:
    metadata:
      labels:
        app: h1b-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/h1b-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: h1b-frontend
  namespace: h1b-lottery
spec:
  selector:
    app: h1b-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: LoadBalancer
