apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: h1b-lottery
data:
  DB_URL: jdbc:postgresql://postgres:5432/h1b_lottery
  CORS_ALLOWED_ORIGINS: http://localhost:3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: h1b-backend
  namespace: h1b-lottery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: h1b-backend
  template:
    metadata:
      labels:
        app: h1b-backend
    spec:
      containers:
        - name: backend
          image: your-registry/h1b-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: h1b-backend
  namespace: h1b-lottery
spec:
  selector:
    app: h1b-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
