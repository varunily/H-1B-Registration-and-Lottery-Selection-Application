services:
  postgres:
    image: postgres:16-alpine
    container_name: h1b-postgres
    environment:
      POSTGRES_DB: h1b_lottery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: h1b-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/h1b_lottery
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: h1b-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
